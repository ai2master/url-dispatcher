# ============================================================================
# GitHub Actions CI/CD 工作流 | CI/CD Workflow
# ============================================================================
#
# 功能概述 | Overview:
#   - 代码格式检查 (rustfmt) + 静态分析 (clippy)
#   - 单元测试 + 集成测试（Linux 使用 Xvfb 虚拟帧缓冲）
#   - 跨平台构建 (Linux + Windows)
#   - Linux 多格式打包：deb / rpm / AppImage
#   - 自动发布 GitHub Release（含所有产物）
#
#   Linux 构建使用 ubuntu-22.04 以降低 GLIBC 要求（2.35），
#   兼容更多 Linux 发行版（如 Ubuntu 22.04+, Debian 12+, Fedora 36+）。
#
#   Linux builds use ubuntu-22.04 to lower GLIBC requirement (2.35),
#   compatible with more Linux distros (Ubuntu 22.04+, Debian 12+, Fedora 36+).
# ============================================================================

name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── 代码格式检查 | Code Formatting Check ───────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ─── 静态分析 | Static Analysis (Clippy) ────────────────────────────────────
  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libatk1.0-dev libglib2.0-dev libpango1.0-dev
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── 测试 | Tests ──────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: [fmt, clippy]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: Install Linux dependencies and Xvfb
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libatk1.0-dev libglib2.0-dev libpango1.0-dev \
            xvfb xauth
      - name: Run tests (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            cargo test --verbose 2>&1
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --verbose

  # ─── Linux 构建 + 打包 | Linux Build + Packaging ───────────────────────────
  #
  # 使用 ubuntu-22.04 降低 GLIBC 要求 (2.35 而非 ubuntu-latest 的 2.39)
  # Uses ubuntu-22.04 to lower GLIBC requirement (2.35 vs ubuntu-latest's 2.39)
  #
  # 产物 | Artifacts:
  #   - url-dispatcher-linux-x86_64           裸二进制 | raw binary
  #   - url-dispatcher_<ver>_amd64.deb        Debian/Ubuntu 包
  #   - url-dispatcher-<ver>-1.x86_64.rpm     Fedora/RHEL 包
  #   - url-dispatcher-<ver>-x86_64.AppImage  通用 Linux | universal
  build-linux:
    name: Build Linux (deb/rpm/AppImage)
    needs: test
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: Linux-22.04-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: Linux-22.04-cargo-release-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libatk1.0-dev libglib2.0-dev libpango1.0-dev \
            libfuse2

      - name: Build release binary
        run: cargo build --release

      # ── 裸二进制 | Raw binary ──
      - name: Prepare raw binary
        run: cp target/release/url-dispatcher url-dispatcher-linux-x86_64

      # ── deb 包 | Debian package ──
      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: cargo deb --no-build

      # ── rpm 包 | RPM package ──
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build rpm package
        run: cargo generate-rpm

      # ── AppImage ──
      - name: Build AppImage
        run: |
          # 下载 linuxdeploy 到临时目录 | Download linuxdeploy to temp dir
          mkdir -p /tmp/tools
          wget -q -O /tmp/tools/linuxdeploy "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x /tmp/tools/linuxdeploy

          VERSION="${GITHUB_REF_NAME#v}"

          # linuxdeploy 会自动创建 AppDir 结构
          # linuxdeploy will automatically create the AppDir structure
          OUTPUT="url-dispatcher-${VERSION}-x86_64.AppImage" \
          /tmp/tools/linuxdeploy \
            --appdir AppDir \
            --executable target/release/url-dispatcher \
            --desktop-file assets/url-dispatcher.desktop \
            --icon-file assets/url-dispatcher.png \
            --output appimage

      # ── 收集所有产物 | Collect all artifacts ──
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp url-dispatcher-linux-x86_64 dist/
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/
          cp url-dispatcher-*.AppImage dist/
          echo "=== Release artifacts ==="
          ls -lh dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*

  # ─── Windows 构建 | Windows Build ──────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: Windows-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: Windows-cargo-release-

      - name: Build release
        run: cargo build --release

      - name: Prepare binary
        run: Copy-Item "target/release/url-dispatcher.exe" "url-dispatcher-windows-x86_64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: url-dispatcher-windows-x86_64.exe

  # ─── 创建 GitHub Release | Create GitHub Release ──────────────────────────
  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist

      - name: List release files
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
