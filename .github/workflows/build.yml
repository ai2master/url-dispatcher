# ============================================================================
# GitHub Actions CI/CD 工作流 | CI/CD Workflow
# ============================================================================
#
# 功能概述 | Overview:
#   本工作流实现 URL Dispatcher 的完整 CI/CD 流水线，包括：
#   - 代码格式检查 (rustfmt)
#   - 静态分析 (clippy)
#   - 全面的单元测试 + 集成测试（Linux 使用 Xvfb 虚拟帧缓冲）
#   - 跨平台构建 (Linux + Windows)
#   - 自动发布 GitHub Release
#
#   This workflow implements the complete CI/CD pipeline for URL Dispatcher:
#   - Code formatting check (rustfmt)
#   - Static analysis (clippy)
#   - Comprehensive unit + integration tests (Linux uses Xvfb virtual framebuffer)
#   - Cross-platform builds (Linux + Windows)
#   - Automated GitHub Release publishing
#
# GUI 测试说明 | GUI Testing Notes:
#   Linux CI 环境没有物理显示器，但 egui/eframe 初始化需要图形上下文。
#   我们使用 Xvfb（X Virtual Framebuffer）提供虚拟 X11 显示服务器，
#   使 GUI 相关的测试能在无头环境中正常运行。
#
#   Linux CI has no physical display, but egui/eframe initialization requires
#   a graphics context. We use Xvfb (X Virtual Framebuffer) to provide a
#   virtual X11 display server, enabling GUI-related tests to run headlessly.
# ============================================================================

name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── 代码格式检查 | Code Formatting Check ───────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ─── 静态分析 | Static Analysis (Clippy) ────────────────────────────────────
  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      # Linux 需要安装 GUI 相关的系统依赖
      # Linux requires GUI-related system dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libatk1.0-dev libglib2.0-dev libpango1.0-dev

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── 全面测试 | Comprehensive Tests ─────────────────────────────────────────
  #
  # 测试矩阵 | Test Matrix:
  #   - Ubuntu: 使用 Xvfb 虚拟帧缓冲运行所有测试（含 GUI 相关）
  #             Uses Xvfb virtual framebuffer for all tests (including GUI-related)
  #   - Windows: 直接运行所有测试
  #              Runs all tests directly
  #
  # 测试覆盖 | Test Coverage:
  #   - test_config: 配置系统（序列化、反序列化、默认值、文件I/O）
  #                  Config system (serialize, deserialize, defaults, file I/O)
  #   - test_i18n: 国际化（语言检测、翻译字符串完整性）
  #                i18n (language detection, translation string completeness)
  #   - test_actions: 动作执行（文件追加、浏览器启动、剪贴板）
  #                   Action execution (file append, browser launch, clipboard)
  #   - doc-tests: 文档示例代码验证
  #                Documentation example code verification
  test:
    name: Test (${{ matrix.os }})
    needs: [fmt, clippy]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      # ── Linux: 安装系统依赖 + Xvfb | Install system deps + Xvfb ──
      - name: Install Linux dependencies and Xvfb
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libatk1.0-dev libglib2.0-dev libpango1.0-dev \
            xvfb xauth

      # ── Linux: 在 Xvfb 虚拟帧缓冲中运行测试 ──
      # ── Linux: Run tests inside Xvfb virtual framebuffer ──
      #
      # xvfb-run 启动一个虚拟 X11 服务器，设置 DISPLAY 环境变量，
      # 然后在该虚拟显示器上运行 cargo test。这使得需要图形上下文的
      # egui/eframe 代码能够正常初始化和运行。
      #
      # xvfb-run starts a virtual X11 server, sets the DISPLAY env var,
      # then runs cargo test on that virtual display. This allows egui/eframe
      # code that requires a graphics context to initialize and run normally.
      - name: Run tests (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            cargo test --verbose 2>&1

      # ── Windows: 直接运行测试 | Run tests directly ──
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --verbose

  # ─── 构建发布二进制 | Build Release Binaries ────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: url-dispatcher
            asset_name: url-dispatcher-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: url-dispatcher.exe
            asset_name: url-dispatcher-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            libatk1.0-dev libglib2.0-dev libpango1.0-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux)
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  # ─── 创建 GitHub Release | Create GitHub Release ───────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: url-dispatcher-linux-x86_64

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: url-dispatcher-windows-x86_64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            url-dispatcher-linux-x86_64
            url-dispatcher-windows-x86_64.exe
